name: Deploy landing page

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/deploy-site.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install rsvg-convert
        run: sudo apt-get update && sudo apt-get install -y librsvg2-bin

      - name: Render OG image PNGs from SVGs
        run: |
          rsvg-convert -w 1200 -h 630 site/og-image.svg        -o site/og-image.png
          rsvg-convert -w 1200 -h 630 site/og-image-plugin.svg -o site/og-image-plugin.png
          ls -la site/og-image*.*

      - name: Stamp build-time freshness dates
        run: |
          TODAY_ISO=$(date -u +%Y-%m-%dT%H:%M:%S+00:00)
          TODAY_DATE=$(date -u +%Y-%m-%d)
          # JSON-LD dateModified — keeps datePublished untouched
          sed -i "s|\"dateModified\": \"[^\"]*\"|\"dateModified\": \"$TODAY_ISO\"|g" site/index.html
          # Sitemap lastmod
          sed -i "s|<lastmod>[^<]*</lastmod>|<lastmod>$TODAY_DATE</lastmod>|g" site/sitemap.xml
          echo "dateModified  -> $TODAY_ISO"
          echo "sitemap lastmod -> $TODAY_DATE"
          grep -c "dateModified" site/index.html
          grep "<lastmod>" site/sitemap.xml

      - name: Inject current library + plugin versions into hero badges
        env:
          # GitHub API call is unauthenticated; this raises the rate-limit
          # ceiling from 60/h to 1000/h for this runner without granting
          # write scope.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # Strict allowlist for what we'll accept as a version. Covers the
          # PyPI / PEP 440 shapes (1.2.3, 1.2.3a1, 1.2.3.dev1, 1.2.3.post1)
          # and the SemVer shapes the plugin uses. Anything else (including
          # injected shell metacharacters from a compromised upstream API
          # response) gets rejected before reaching sed.
          is_valid_version() {
            local v="$1"
            [[ "$v" =~ ^[0-9]+\.[0-9]+(\.[0-9]+)?([.-]?(a|b|rc|alpha|beta|dev|post)[0-9]*)?$ ]]
          }

          # ─── Library version from PyPI ───────────────────────────────
          # Captured as a variable so the API response can't reach sed or
          # echo without passing the regex check first.
          LIB_RAW=$(curl --fail --silent --show-error --max-time 15 \
            https://pypi.org/pypi/agent-coherence/json | jq -r '.info.version' || echo "")
          if [ -z "$LIB_RAW" ] || [ "$LIB_RAW" = "null" ]; then
            echo "WARN: PyPI lookup returned empty; keeping existing library version in HTML"
          elif ! is_valid_version "$LIB_RAW"; then
            printf 'WARN: PyPI returned unexpected version shape (%q); keeping existing\n' "$LIB_RAW"
          else
            LIB_VERSION="$LIB_RAW"
            printf 'library version -> %s\n' "$LIB_VERSION"
            # / and /code/ share the same library badge
            for page in site/index.html site/code/index.html; do
              sed -i "s|<span class=\"ver\">[^<]*</span>|<span class=\"ver\">${LIB_VERSION}</span>|g" "$page"
            done
          fi

          # ─── Plugin version from GitHub releases ─────────────────────
          PLUGIN_TAG_RAW=$(curl --fail --silent --show-error --max-time 15 \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/hipvlady/agent-coherence-plugin/releases/latest \
            | jq -r '.tag_name' || echo "")
          # Strip a leading 'v' if present so the badge shape stays
          # 'v<span class="ver">0.2.0</span> · ...'
          PLUGIN_RAW="${PLUGIN_TAG_RAW#v}"
          if [ -z "$PLUGIN_RAW" ] || [ "$PLUGIN_RAW" = "null" ]; then
            echo "WARN: GitHub releases lookup returned empty; keeping existing plugin version in HTML"
          elif ! is_valid_version "$PLUGIN_RAW"; then
            printf 'WARN: GitHub returned unexpected tag shape (%q); keeping existing\n' "$PLUGIN_RAW"
          else
            PLUGIN_VERSION="$PLUGIN_RAW"
            printf 'plugin version -> %s\n' "$PLUGIN_VERSION"
            sed -i "s|<span class=\"ver\">[^<]*</span>|<span class=\"ver\">${PLUGIN_VERSION}</span>|g" site/plugin/index.html
          fi

          echo "─── post-injection badge state ───"
          for page in site/index.html site/code/index.html site/plugin/index.html; do
            printf '  %s: ' "$page"
            grep -oE '<span class="ver">[^<]+</span>' "$page" | head -1
          done

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  indexnow:
    needs: deploy
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Notify IndexNow (Bing, Yandex, Seznam, Naver)
        run: |
          curl -fsS -X POST "https://api.indexnow.org/IndexNow" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d '{
              "host": "agent-coherence.dev",
              "key": "9b9d7a5dd4c917e5ab2cfc22d73438760ace80a06536b547787f635db41a2cf8",
              "keyLocation": "https://agent-coherence.dev/9b9d7a5dd4c917e5ab2cfc22d73438760ace80a06536b547787f635db41a2cf8.txt",
              "urlList": [
                "https://agent-coherence.dev/",
                "https://agent-coherence.dev/code/",
                "https://agent-coherence.dev/plugin/",
                "https://agent-coherence.dev/llms.txt",
                "https://agent-coherence.dev/sitemap.xml"
              ]
            }'
          echo "IndexNow notified."
