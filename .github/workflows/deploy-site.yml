name: Deploy landing page

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/deploy-site.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install rsvg-convert
        run: sudo apt-get update && sudo apt-get install -y librsvg2-bin

      - name: Render OG image PNG from SVG
        run: |
          rsvg-convert -w 1200 -h 630 site/og-image.svg -o site/og-image.png
          ls -la site/og-image.*

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  indexnow:
    needs: deploy
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Notify IndexNow (Bing, Yandex, Seznam, Naver)
        run: |
          curl -fsS -X POST "https://api.indexnow.org/IndexNow" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d '{
              "host": "agent-coherence.dev",
              "key": "9b9d7a5dd4c917e5ab2cfc22d73438760ace80a06536b547787f635db41a2cf8",
              "keyLocation": "https://agent-coherence.dev/9b9d7a5dd4c917e5ab2cfc22d73438760ace80a06536b547787f635db41a2cf8.txt",
              "urlList": [
                "https://agent-coherence.dev/",
                "https://agent-coherence.dev/llms.txt",
                "https://agent-coherence.dev/sitemap.xml"
              ]
            }'
          echo "IndexNow notified."
