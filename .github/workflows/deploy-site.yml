name: Deploy landing page

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/deploy-site.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install rsvg-convert
        run: sudo apt-get update && sudo apt-get install -y librsvg2-bin

      - name: Render OG image PNGs from SVGs
        run: |
          rsvg-convert -w 1200 -h 630 site/og-image.svg        -o site/og-image.png
          rsvg-convert -w 1200 -h 630 site/og-image-plugin.svg -o site/og-image-plugin.png
          rsvg-convert -w 1200 -h 630 site/og-image-rag.svg    -o site/og-image-rag.png
          ls -la site/og-image*.*

      - name: Stamp build-time freshness dates
        run: |
          TODAY_ISO=$(date -u +%Y-%m-%dT%H:%M:%S+00:00)
          TODAY_DATE=$(date -u +%Y-%m-%d)
          # JSON-LD dateModified — keeps datePublished untouched
          sed -i "s|\"dateModified\": \"[^\"]*\"|\"dateModified\": \"$TODAY_ISO\"|g" site/index.html
          # Sitemap lastmod
          sed -i "s|<lastmod>[^<]*</lastmod>|<lastmod>$TODAY_DATE</lastmod>|g" site/sitemap.xml
          echo "dateModified  -> $TODAY_ISO"
          echo "sitemap lastmod -> $TODAY_DATE"
          grep -c "dateModified" site/index.html
          grep "<lastmod>" site/sitemap.xml

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  indexnow:
    needs: deploy
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Notify IndexNow via Bing (Yandex excluded per compliance policy)
        # Submit to Bing's own IndexNow endpoint rather than the shared
        # api.indexnow.org pool, so our direct outbound goes only to
        # Microsoft. IndexNow is a consortium protocol, so a participating
        # engine MAY still redistribute downstream — but Yandex is blocked
        # from indexing at the authoritative layer (robots.txt Disallow for
        # User-agent: Yandex), which is the decisive control regardless of
        # any IndexNow notification it receives.
        run: |
          curl -fsS -X POST "https://www.bing.com/indexnow" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d '{
              "host": "agent-coherence.dev",
              "key": "9b9d7a5dd4c917e5ab2cfc22d73438760ace80a06536b547787f635db41a2cf8",
              "keyLocation": "https://agent-coherence.dev/9b9d7a5dd4c917e5ab2cfc22d73438760ace80a06536b547787f635db41a2cf8.txt",
              "urlList": [
                "https://agent-coherence.dev/",
                "https://agent-coherence.dev/code/",
                "https://agent-coherence.dev/plugin/",
                "https://agent-coherence.dev/rag/",
                "https://agent-coherence.dev/llms.txt",
                "https://agent-coherence.dev/sitemap.xml"
              ]
            }'
          echo "IndexNow notified."
